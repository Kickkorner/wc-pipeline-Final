name: Daily World Cup Cinematic Video

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg & deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: 1. Find today's topic + source clip
        run: python scripts/find_source.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 2. Build cinematic edit (Shorts + Long)
        run: bash scripts/edit.sh

      - name: 3. Upload to YouTube
        run: python scripts/upload_youtube.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
